name: CI/CD Pipeline  # Nome da pipeline

on:
  push:
    branches:
      - main  # Executa quando houver push na branch main

jobs:
  build-deploy:
    runs-on: ubuntu-latest  # Runner Linux do GitHub

    steps:
      - name: Checkout code
        uses: actions/checkout@v3  # Baixa o código do repositório

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}         # Access Key AWS
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }} # Secret Key AWS
          aws-region: ap-southeast-2                                  # Região da AWS

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v1  # Autentica no ECR

      - name: Build Docker image
        run: |
          docker build -t devops-demo:${{ github.sha }} ./app
          # Cria imagem Docker com versão única baseada no commit

      - name: Tag Docker image (SHA)
        run: |
          docker tag devops-demo:${{ github.sha }} 869935080468.dkr.ecr.ap-southeast-2.amazonaws.com/devops-demolucas:${{ github.sha }}
          # Tag para enviar ao ECR com versionamento

      - name: Push to ECR (SHA)
        run: |
          docker push 869935080468.dkr.ecr.ap-southeast-2.amazonaws.com/devops-demolucas:${{ github.sha }}
          # Envia imagem versionada

      - name: Tag Docker image (latest)
        run: |
          docker tag devops-demo:${{ github.sha }} 869935080468.dkr.ecr.ap-southeast-2.amazonaws.com/devops-demolucas:latest
          # Tag adicional para compatibilidade

      - name: Push to ECR (latest)
        run: |
          docker push 869935080468.dkr.ecr.ap-southeast-2.amazonaws.com/devops-demolucas:latest
          # Envia latest

      - name: Install kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/
          # Instala kubectl no runner

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --name devops-demo --region ap-southeast-2
          # Conecta no cluster EKS

      - name: Deploy to EKS
        run: |
          kubectl apply -f k8s/
          # Aplica deployment e service no cluster